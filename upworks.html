<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OppHub | Glassmorphism Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(224, 242, 254, 0.5) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(241, 245, 249, 0.5) 0px, transparent 50%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.05);
        }

        .job-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .job-card:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
        }

        .nav-link-active {
            background: rgba(15, 23, 42, 0.05);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(15, 23, 42, 0.1);
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(226, 232, 240, 1);
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #0f172a !important;
            color: white !important;
            border-color: #0f172a !important;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        .bookmark-active {
            fill: #0f172a;
            stroke: #0f172a;
        }
    </style>
</head>

<body class="text-slate-900 flex min-h-screen">
    <aside class="w-64 glass border-r p-6 hidden md:flex flex-col sticky top-0 h-screen z-20">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-7 h-7 bg-slate-900 rounded-lg flex items-center justify-center font-bold text-white text-xs shadow-lg">OH</div>
            <h1 class="text-lg font-bold tracking-tight text-slate-900">OppHub</h1>
        </div>
        <nav class="space-y-1.5 flex-1">
            <a href="#" id="nav-find" class="nav-link nav-link-active flex items-center gap-3 px-3 py-2 text-slate-900 rounded-xl font-semibold text-sm transition-all">Find Work</a>
            <a href="#" id="nav-wishlist" class="nav-link flex items-center gap-3 px-3 py-2 hover:bg-white/50 transition rounded-xl text-slate-500 text-sm">Saved Items</a>
            <a href="#" id="nav-completed" class="nav-link flex items-center gap-3 px-3 py-2 hover:bg-white/50 transition rounded-xl text-slate-500 text-sm">Project History</a>
        </nav>
        
        <div id="view-indicator" class="hidden mt-4 pt-4 border-t border-slate-200/50">
            <button id="back-to-feed" class="text-slate-900 text-xs font-bold flex items-center gap-2 hover:opacity-70 uppercase tracking-widest">
                ← Back to Feed
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            
            <div>
                <h2 id="main-title" class="text-3xl font-extrabold text-slate-900 tracking-tight">Browse Projects</h2>
                <p id="main-subtitle" class="text-slate-500 text-sm mt-1">Curated opportunities for your expertise.</p>
            </div>
            
            <div class="flex gap-3">
                <button id="refresh-feed-btn" class="px-5 py-2.5 bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-slate-800 transition-all shadow-lg active:scale-95">
                    ↻ Refresh Feed
                </button>
                <button id="clear-storage-btn" class="hidden px-5 py-2.5 bg-red-50/50 border border-red-100 text-red-600 text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-sm">
                    Clear History
                </button>
            </div>
        </header>

        <section id="insights-bar" class="mb-10 p-6 glass rounded-2xl sticky top-6 z-10 hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-6">
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100/50 px-2 py-1 rounded">Top Interests</div>
                    <div id="top-skills" class="flex gap-2"></div>
                </div>
                <div class="flex gap-8">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Saved</span>
                        <span id="count-wish" class="text-xl font-bold text-slate-900">0</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Done</span>
                        <span id="count-done" class="text-xl font-bold text-slate-900">0</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-10">
            <div class="flex gap-3 mb-6">
                <div class="relative flex-1">
                    <input id="search-input" type="text" placeholder="Search keywords (e.g. React, PHP, Security)..."
                        class="w-full pl-5 pr-4 py-4 glass rounded-2xl focus:outline-none focus:ring-2 focus:ring-slate-900/5 transition text-sm shadow-sm placeholder:text-slate-400" />
                </div>
                <button id="add-job-btn" class="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold">
    + Add Job
</button>
                <button id="search-btn" class="px-8 py-4 bg-slate-900 hover:bg-slate-800 text-white text-sm font-bold rounded-2xl transition shadow-xl shadow-slate-900/20 active:scale-95">
                    Search
                </button>
            </div>
            
            <div id="filter-container" class="flex gap-2 flex-wrap p-2 bg-white/30 backdrop-blur-sm border border-white/50 rounded-2xl">
                <button class="filter-btn active px-5 py-2 rounded-xl text-xs font-semibold" data-category="All">All Projects</button>
                <button class="filter-btn px-5 py-2 rounded-xl text-xs font-semibold" data-category="AI">AI & Machine Learning</button>
                <button class="filter-btn px-5 py-2 rounded-xl text-xs font-semibold" data-category="Web">Web Development</button>
                <button class="filter-btn px-5 py-2 rounded-xl text-xs font-semibold" data-category="Mobile">Mobile Apps</button>
                <button class="filter-btn px-5 py-2 rounded-xl text-xs font-semibold" data-category="Security">Cybersecurity</button>
            </div>
        </section>

        <div id="container" class="grid grid-cols-1 gap-4 pb-20">
            </div>
    </main>
    <div id="job-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-xl">
        
        <h2 class="text-lg font-bold mb-4">Add New Job</h2>

        <div class="space-y-3">
            <input id="job-title" placeholder="Title" class="w-full p-2 border rounded" />
            <input id="job-skills" placeholder="Skills (comma separated)" class="w-full p-2 border rounded" />
            <input id="job-budget" placeholder="Budget" class="w-full p-2 border rounded" />
            <input id="job-level" placeholder="Level" class="w-full p-2 border rounded" />
            <textarea id="job-desc" placeholder="Description" class="w-full p-2 border rounded"></textarea>
        </div>

        <div class="flex justify-end gap-3 mt-4">
            <button id="close-modal" class="px-4 py-2 text-sm">Cancel</button>
            <button id="save-job" class="px-4 py-2 bg-slate-900 text-white rounded">Add</button>
        </div>

    </div>
</div>
</body>

</html>
